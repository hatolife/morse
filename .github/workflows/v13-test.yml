name: Tests (v13)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'v13/**'
      - '.github/workflows/v13-test.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'v13/**'
      - '.github/workflows/v13-test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Tests (v13) on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            v13/lib/package-lock.json
            v13/app/package-lock.json

      - name: Install morse-engine dependencies
        working-directory: v13/lib
        run: npm ci

      - name: Run morse-engine unit tests
        working-directory: v13/lib
        run: npm test

      - name: Build morse-engine
        working-directory: v13/lib
        run: npm run build

      - name: Install app dependencies
        working-directory: v13/app
        run: npm ci

      - name: Build app
        working-directory: v13/app
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('v13/app/package-lock.json') }}

      - name: Install Playwright browsers (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: v13/app
        run: npx playwright install chromium --with-deps

      - name: Install Playwright dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: v13/app
        run: npx playwright install-deps chromium

      - name: Run debug E2E tests
        working-directory: v13/app
        run: npx playwright test e2e/debug.spec.ts --project=chromium
        continue-on-error: true

      - name: Run all E2E tests
        working-directory: v13/app
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-v13
          path: v13/app/playwright-report/
          retention-days: 30
